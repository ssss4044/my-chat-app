<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最強チャット (DB・ルーム・既読)</title>
    <style>
        /* 既存のスタイルを継承しつつ追加 */
        #room-select-area { background: #fff; padding: 10px; border-bottom: 1px solid #ccc; display: flex; gap: 10px; align-items: center; }
        .read-mark { font-size: 0.6em; color: #85e249; margin-right: 5px; align-self: flex-end; visibility: hidden; }
        .is-read { visibility: visible; }
        /* 自分のメッセージの横に既読を出す */
        .my-row .read-mark { order: 1; }
    </style>
</head>
<body>
    <div id="room-select-area">
        <input id="room-input" placeholder="部屋名（例: 家族, 秘密）" />
        <button id="join-btn">入室</button>
        <span id="current-room-display" style="font-weight:bold; margin-left:auto;">未入室</span>
    </div>

    <ul id="messages"></ul>

    <form id="form">
        <span class="settings-btn" id="open-settings">⚙️</span>
        <label class="file-label"><input type="file" id="file-input" accept="image/*"> 📷</label>
        <input id="input" autocomplete="off" placeholder="メッセージ..." />
        <button type="submit">送信</button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentRoom = "";

        // ルーム入室処理
        document.getElementById('join-btn').onclick = () => {
            currentRoom = document.getElementById('room-input').value || "public";
            socket.emit('join room', currentRoom);
            document.getElementById('current-room-display').innerText = `部屋: ${currentRoom}`;
            document.getElementById('messages').innerHTML = '';
        };

        const displayMessage = (data) => {
            const isMe = (data.name === localStorage.getItem('chat-name'));
            const container = document.createElement('li');
            container.classList.add('msg-container', isMe ? 'my-row' : 'other-row');
            container.id = `msg-${data._id}`; // 既読更新用にIDを振る

            // 既読マークのHTML
            const readHTML = isMe ? `<span class="read-mark ${data.read ? 'is-read' : ''}">既読</span>` : '';

            container.innerHTML = `
                <img class="avatar" src="${data.avatar}">
                <div class="msg-content">
                    <span class="name-label">${data.name}</span>
                    <div style="display:flex;">
                        ${readHTML}
                        <div class="msg-item ${isMe ? 'my-msg' : 'other-msg'}">
                            ${data.text ? data.text : ''}
                            ${data.image ? `<img src="${data.image}" class="chat-img">` : ''}
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('messages').appendChild(container);
            
            // 自分以外が送った未読メッセージなら既読にする
            if (!isMe && !data.read) {
                socket.emit('mark read', data._id);
            }
        };

        socket.on('load log', (log) => log.forEach(displayMessage));
        socket.on('chat message', displayMessage);
        
        // 既読表示の更新
        socket.on('update read', (msgId) => {
            const el = document.querySelector(`#msg-${msgId} .read-mark`);
            if (el) el.classList.add('is-read');
        });

        // 送信時はcurrentRoomを添える
        document.getElementById('form').onsubmit = (e) => {
            e.preventDefault();
            if (!currentRoom) return alert("部屋に入ってください");
            // ... (画像読み込み処理は前回と同じ) ...
            socket.emit('chat message', {
                room: currentRoom,
                name: localStorage.getItem('chat-name'),
                text: document.getElementById('input').value,
                avatar: localStorage.getItem('chat-avatar'),
                image: img // FileReaderで読んだデータ
            });
        };
    </script>
</body>
</html>
