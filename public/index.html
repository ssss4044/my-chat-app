<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アイコン付きチャット</title>
    <style>
        body { font-family: sans-serif; background-color: #7494c0; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #messages { list-style-type: none; margin: 0; padding: 20px; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; }

        /* メッセージ全体の枠 */
        .msg-container { display: flex; margin-bottom: 15px; align-items: flex-start; }
        
        /* アイコンのスタイル */
        .avatar { width: 40px; height: 40px; border-radius: 50%; background-color: #eee; margin: 0 10px; object-fit: cover; flex-shrink: 0; }

        .msg-content { max-width: 70%; display: flex; flex-direction: column; }
        .msg-item { padding: 10px; border-radius: 15px; position: relative; line-height: 1.4; word-wrap: break-word; }
        .name-label { font-size: 0.7em; margin-bottom: 3px; font-weight: bold; color: rgba(255,255,255,0.8); }

        /* 自分のメッセージ（右側） */
        .my-row { flex-direction: row-reverse; }
        .my-msg { background-color: #85e249; border-top-right-radius: 2px; color: #000; }
        .my-row .name-label { text-align: right; }

        /* 他人のメッセージ（左側） */
        .other-row { flex-direction: row; }
        .other-msg { background-color: #ffffff; border-top-left-radius: 2px; color: #000; }

        /* 入力エリア */
        #form { display: flex; flex-wrap: wrap; background: #fff; padding: 10px; border-top: 1px solid #ccc; }
        .input-group { display: flex; width: 100%; margin-bottom: 5px; }
        #user-name, #user-avatar { padding: 8px; border: 1px solid #ddd; border-radius: 5px; margin-right: 5px; font-size: 12px; }
        #user-name { width: 80px; }
        #user-avatar { flex-grow: 1; }
        #input { flex-grow: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        button { background: #00b900; color: white; border: none; padding: 10px 20px; border-radius: 20px; margin-left: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <ul id="messages"></ul>
    <form id="form">
        <div class="input-group">
            <input id="user-name" placeholder="名前" required />
            <input id="user-avatar" placeholder="アイコン画像のURL (空でもOK)" />
        </div>
        <input id="input" autocomplete="off" placeholder="メッセージを入力..." required />
        <button>送信</button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const nameInput = document.getElementById('user-name');
        const avatarInput = document.getElementById('user-avatar');
        const messages = document.getElementById('messages');

        // デフォルトアイコン
        const defaultAvatar = "https://cdn-icons-png.flaticon.com/512/149/149071.png";

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value && nameInput.value) {
                socket.emit('chat message', {
                    name: nameInput.value,
                    text: input.value,
                    avatar: avatarInput.value || defaultAvatar
                });
                input.value = '';
            }
        });

        socket.on('chat message', (data) => {
            const container = document.createElement('li');
            container.classList.add('msg-container');
            
            if (data.id === socket.id) {
                container.classList.add('my-row');
            } else {
                container.classList.add('other-row');
            }

            container.innerHTML = `
                <img class="avatar" src="${data.avatar}" onerror="this.src='${defaultAvatar}'">
                <div class="msg-content">
                    <span class="name-label">${data.name}</span>
                    <div class="msg-item ${data.id === socket.id ? 'my-msg' : 'other-msg'}">${data.text}</div>
                </div>
            `;
            
            messages.appendChild(container);
            messages.scrollTop = messages.scrollHeight;
        });
    </script>
</body>
</html>
